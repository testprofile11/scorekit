<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="J1 Hoops">
  <meta name="description" content="J1 Hoops basketball scoreboard with team names, scores, and game timer.">
  <title>J1 Hoops Scoreboard</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scoreboard-app">
    <header class="brand-bar">
      <img src="logo.png" alt="J1 Hoops logo">
      <div>
        <span>Basketball</span>
        <strong>J1 Hoops</strong>
      </div>
      <button id="reset-all" type="button" aria-label="Reset scoreboard">Reset</button>
    </header>

    <section class="scoreboard">
      <article class="team-card">
        <input id="team-a-name" value="HOME" aria-label="Team A name">
        <strong id="score-a">0</strong>
        <div class="score-buttons">
          <button type="button" data-team="a" data-points="-1">-</button>
          <button type="button" data-team="a" data-points="1">+1</button>
          <button type="button" data-team="a" data-points="2">+2</button>
          <button type="button" data-team="a" data-points="3">+3</button>
        </div>
      </article>

      <section class="timer-card" aria-label="Game timer">
        <span>Game Timer</span>
        <strong id="timer-display">12:00</strong>
        <div class="timer-buttons">
          <button id="timer-toggle" type="button">Start</button>
          <button id="timer-reset" type="button">Reset</button>
        </div>
        <form class="timer-edit" id="timer-edit">
          <label>
            Min
            <input id="timer-minutes" type="number" min="0" max="99" value="12">
          </label>
          <label>
            Sec
            <input id="timer-seconds" type="number" min="0" max="59" value="0">
          </label>
          <button type="submit">Set</button>
        </form>
      </section>

      <article class="team-card">
        <input id="team-b-name" value="AWAY" aria-label="Team B name">
        <strong id="score-b">0</strong>
        <div class="score-buttons">
          <button type="button" data-team="b" data-points="-1">-</button>
          <button type="button" data-team="b" data-points="1">+1</button>
          <button type="button" data-team="b" data-points="2">+2</button>
          <button type="button" data-team="b" data-points="3">+3</button>
        </div>
      </article>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
